<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Escape Room | Unlocking Curved Space</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0e1117">
  <style>
    :root {
      --bg: #0e1117;
      --panel: rgba(22, 27, 38, 0.94);
      --panel-2: rgba(31, 38, 54, 0.96);
      --text: #f3efe3;
      --muted: #c8c0aa;
      --gold: #d8b15f;
      --blue: #6aa6c8;
      --red: #b95d5d;
      --green: #7cbf8c;
      --border: rgba(216, 177, 95, 0.35);
      --shadow: 0 20px 50px rgba(0,0,0,0.35);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, 'Times New Roman', serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 15%, rgba(106,166,200,0.22), transparent 28%),
        radial-gradient(circle at 85% 20%, rgba(216,177,95,0.14), transparent 26%),
        linear-gradient(135deg, #080a0f 0%, #111827 45%, #07080b 100%);
      overflow-x: hidden;
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at center, black, transparent 80%);
    }

    .app {
      width: min(1080px, 94vw);
      margin: 0 auto;
      padding: 24px 0 42px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      margin-bottom: 22px;
    }

    .brand {
      border: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(216,177,95,0.12), rgba(106,166,200,0.08));
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 22px;
      position: relative;
      overflow: hidden;
    }

    .brand::after {
      content: "∇  g  R  μν  =  0";
      position: absolute;
      right: 20px;
      bottom: 8px;
      color: rgba(255,255,255,0.08);
      font-size: 48px;
      letter-spacing: 8px;
      white-space: nowrap;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 4rem);
      line-height: 0.95;
      letter-spacing: 0.02em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.2rem);
      max-width: 780px;
      line-height: 1.45;
    }

    .hud {
      display: grid;
      gap: 10px;
      min-width: 210px;
    }

    .hud-card {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .hud-label {
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .hud-value {
      margin-top: 4px;
      color: var(--text);
      font-size: 1.25rem;
      font-weight: 700;
    }

    main {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 20px;
      align-items: start;
    }

    .map, .room {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .map {
      padding: 18px;
      position: sticky;
      top: 18px;
    }

    .map h2, .room h2 {
      margin: 0 0 12px;
      color: var(--gold);
      font-size: 1.25rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .path {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .node {
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-radius: 15px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.035);
      color: var(--muted);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .node.active {
      border-color: var(--gold);
      background: rgba(216,177,95,0.13);
      color: var(--text);
    }

    .node.done {
      border-color: rgba(124,191,140,0.65);
      background: rgba(124,191,140,0.10);
      color: var(--text);
    }

    .node-number {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(216,177,95,0.16);
      color: var(--gold);
      font-weight: 800;
    }

    .node-title { font-weight: 700; }
    .node-small { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

    .room {
      padding: clamp(18px, 3vw, 30px);
      min-height: 560px;
      position: relative;
      overflow: hidden;
    }

    .room::after {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      border: 1px solid rgba(216,177,95,0.12);
      border-radius: 50%;
      right: -130px;
      top: -110px;
      box-shadow: inset 0 0 70px rgba(216,177,95,0.06);
    }

    .intro, .challenge, .ending {
      position: relative;
      z-index: 1;
    }

    .quote {
      margin: 18px 0;
      padding: 18px;
      border-left: 4px solid var(--blue);
      background: rgba(106,166,200,0.09);
      border-radius: 0 16px 16px 0;
      color: #eef7fb;
      font-size: 1.08rem;
      line-height: 1.55;
    }

    p, li {
      line-height: 1.55;
      font-size: 1.02rem;
    }

    .mission {
      border: 1px dashed rgba(216,177,95,0.45);
      border-radius: 18px;
      background: rgba(216,177,95,0.08);
      padding: 16px;
      color: var(--muted);
      margin: 16px 0 20px;
    }

    .question {
      margin: 22px 0;
      padding: 18px;
      background: var(--panel-2);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
    }

    .question h3 {
      margin: 0 0 14px;
      color: var(--text);
      font-size: 1.05rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    label.option {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: start;
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    label.option:hover { border-color: rgba(216,177,95,0.45); }

    input[type="radio"], input[type="checkbox"] {
      accent-color: var(--gold);
      margin-top: 3px;
      transform: scale(1.15);
    }

    .match-grid {
      display: grid;
      gap: 12px;
    }

    .match-row {
      display: grid;
      grid-template-columns: 1fr minmax(180px, 260px);
      gap: 12px;
      align-items: center;
    }

    select, input[type="text"] {
      width: 100%;
      border: 1px solid rgba(216,177,95,0.35);
      border-radius: 12px;
      padding: 12px;
      background: rgba(0,0,0,0.24);
      color: var(--text);
      font-size: 1rem;
    }

    select option { background: #161b26; color: var(--text); }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      cursor: pointer;
      font-weight: 800;
      letter-spacing: 0.02em;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 46px;
    }

    .primary {
      background: linear-gradient(135deg, var(--gold), #f1d48a);
      color: #19140a;
    }

    .secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .feedback {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 16px;
      display: none;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .feedback.ok {
      display: block;
      background: rgba(124,191,140,0.16);
      border: 1px solid rgba(124,191,140,0.55);
    }

    .feedback.no {
      display: block;
      background: rgba(185,93,93,0.16);
      border: 1px solid rgba(185,93,93,0.55);
    }

    .badge {
      display: inline-block;
      margin: 4px 6px 4px 0;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(106,166,200,0.16);
      border: 1px solid rgba(106,166,200,0.35);
      color: #dff4ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.88rem;
    }

    .final-code {
      display: grid;
      place-items: center;
      margin: 28px 0;
      padding: 26px;
      border-radius: 20px;
      background: rgba(216,177,95,0.10);
      border: 1px solid rgba(216,177,95,0.45);
      font-size: clamp(2.4rem, 7vw, 5rem);
      color: var(--gold);
      letter-spacing: 0.16em;
      font-weight: 900;
      font-family: Georgia, 'Times New Roman', serif;
    }

    .prize-box, .learning-summary {
      margin-top: 20px;
      padding: 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(216,177,95,0.28);
    }

    .learning-summary h3 {
      margin: 18px 0 8px;
      color: var(--gold);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .learning-summary ul { margin-top: 8px; padding-left: 22px; }

    .celebration {
      display: none;
      margin-top: 16px;
      padding: 18px;
      border-radius: 18px;
      background: rgba(124,191,140,0.16);
      border: 1px solid rgba(124,191,140,0.55);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .celebration.show { display: block; }

    .confetti-piece {
      position: fixed;
      top: -20px;
      width: 10px;
      height: 16px;
      background: var(--gold);
      opacity: 0.9;
      z-index: 9999;
      animation: fall 1.8s linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }

    .hidden { display: none; }

    @media (max-width: 1024px) {
      .app {
        width: 100%;
        max-width: 100%;
      }

      main {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .map { padding: 16px; }
      .node { grid-template-columns: 34px 1fr; }
      .node-number { width: 34px; height: 34px; }
    }

    @media (max-width: 820px) {
      html, body {
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      .app {
        width: 100%;
        max-width: 100%;
        margin: 0;
        padding: 0 0 24px;
      }

      header, main { grid-template-columns: 1fr; }

      header { gap: 0; margin-bottom: 0; }

      .brand {
        width: 100%;
        padding: 20px 16px 18px;
        border-radius: 0;
        border-left: 0;
        border-right: 0;
        box-shadow: none;
      }

      .brand::after { display: none; }

      h1 {
        font-size: clamp(1.85rem, 9vw, 2.8rem);
        line-height: 1.02;
        letter-spacing: 0.01em;
        overflow-wrap: anywhere;
      }

      .subtitle {
        font-size: 1.05rem;
        line-height: 1.45;
        max-width: none;
      }

      .hud {
        grid-template-columns: 1fr 1fr;
        min-width: 0;
        gap: 0;
        width: 100%;
      }

      .hud-card {
        padding: 12px 14px;
        border-radius: 0;
        border-left: 0;
        border-right: 0;
        box-shadow: none;
      }

      .hud-label { font-size: 0.72rem; }
      .hud-value { font-size: 1.05rem; }

      /* On phones the side map was the main cause of horizontal, cramped layout.
         It is hidden and replaced by the Room / Codes counters above. */
      .map {
        display: none;
      }

      .room {
        width: 100%;
        max-width: 100%;
        min-height: auto;
        padding: 18px 14px 24px;
        border-radius: 0;
        border-left: 0;
        border-right: 0;
        box-shadow: none;
        overflow: visible;
      }

      .room::after { display: none; }

      .room h2 {
        font-size: 1.45rem;
        line-height: 1.18;
        letter-spacing: 0.04em;
        overflow-wrap: anywhere;
      }

      p, li, .quote {
        font-size: 1.08rem;
        line-height: 1.55;
      }

      .quote {
        padding: 15px;
        margin: 16px 0;
        border-radius: 0 14px 14px 0;
      }

      .question {
        padding: 15px;
        margin: 18px 0;
        border-radius: 16px;
      }

      .question h3 {
        font-size: 1.08rem;
        line-height: 1.35;
      }

      label.option {
        grid-template-columns: 28px 1fr;
        padding: 15px;
        font-size: 1.04rem;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      input[type="radio    @media (max-width: 480px) {
      body {
        background-attachment: scroll;
      }

      .app {
        width: 100%;
        padding-top: 0;
      }

      .brand,
      .room,
      .hud-card {
        border-radius: 0;
      }

      .brand { padding: 18px 14px 16px; }

      h1 {
        font-size: clamp(1.7rem, 8.8vw, 2.35rem);
        line-height: 1.04;
      }

      .subtitle {
        font-size: 1rem;
        line-height: 1.45;
      }

      .hud-label { font-size: 0.68rem; letter-spacing: 0.06em; }

      .room { padding: 16px 12px 22px; }

      p, li, .quote, label.option { font-size: 1rem; }
      .question h3 { font-size: 1.02rem; }
      .question { padding: 14px; }

      .final-code {

        letter-spacing: 0.06em;
      }
    }

    @media (max-width: 360px)em; letter-spacing: 0.08em; }
      .hud-value { font-size: 1.12rem; }

      .node { min-width: 178px; }
      .node-title { font-size: 0.95rem; }
      .node-small { font-size: 0.78rem; }

      .room { padding: 20px 15px; }

    @media (max-width: 360px) {

<body>
  <div class="app">
    <header>
      <section class="brand">
        <h1>Unlocking Curved Space</h1>
        <p class="subtitle">A physics and language escape room: follow Riemann’s clues, decode the language of curved spaces, and unlock the code behind relativity.</p>
      </section>
      <aside class="hud">
        <div class="hud-card">
          <div class="hud-label">Room</div>
          <div class="hud-value" id="roomCounter">Intro</div>
        </div>
        <div class="hud-card">
          <div class="hud-label">Codes collected</div>
          <div class="hud-value" id="codeCounter">0/5</div>
        </div>
      </aside>
    </header>

    <main>
      <nav class="map" aria-label="Escape room map">
        <h2>Map</h2>
        <p style="color:var(--muted); margin-top:0;">Complete the rooms in order. Each challenge unlocks part of the final code.</p>
        <div class="path" id="path"></div>
      </nav>

      <section class="room" id="room"></section>
    </main>
  </div>

  <script>
    const rooms = [
      {
        title: "The Broken Idea",
        type: "single",
        key: "C",
        prompt: "In the video, we hear: “Gravity was not a force pulling objects together, but a physical warping of space itself.” What does this mean in the context of general relativity?",
        quote: "Gravity was not a force pulling objects together, but a physical warping of space itself.",
        options: [
          "Gravity is an invisible force that simply pulls all bodies downward.",
          "Gravity is connected to the deformation of space-time.",
          "Gravity exists only on Earth.",
          "Gravity is a property of magnets."
        ],
        answer: 1,
        explanation: "Correct: in general relativity, gravity is described as an effect of the curvature of space-time, not simply as an ordinary Newtonian force."
      },
      {
        title: "Expressions Under Pressure",
        type: "match",
        key: "R",
        prompt: "Match each expression from the video with its correct meaning.",
        pairs: [
          { left: "Einstein hit a wall", correct: "He reached a theoretical obstacle" },
          { left: "pushed Riemann to the brink", correct: "It brought him close to collapse" },
          { left: "broke with centuries of physics", correct: "It rejected a long-established tradition" },
          { left: "lacked the language", correct: "He did not have the necessary conceptual tools" }
        ],
        choices: [
          "He did not have the necessary conceptual tools",
          "It rejected a long-established tradition",
          "He reached a theoretical obstacle",
          "It brought him close to collapse"
        ],
        explanation: "Excellent: these expressions should not be translated word by word. They must be understood in their narrative and scientific context."
      },
      {
        title: "Flat or Curved?",
        type: "multi",
        key: "I",
        prompt: "Answer all the questions about Riemannian geometry.",
        questions: [
          {
            q: "According to the video, what was the limit of Euclidean geometry?",
            options: ["It could not calculate areas.", "It was invented too late.", "It could not describe curved spaces in a general way.", "It did not use numbers."],
            answer: 2
          },
          {
            q: "What did Riemann introduce?",
            options: ["A geometry valid only for flat triangles.", "A way to describe spaces that can have many dimensions and curvature.", "A new theory of light.", "A law of classical mechanics."],
            answer: 1
          },
          {
            q: "Complete the idea: in general relativity, a mass changes the geometry of...",
            options: ["a flat Euclidean plane", "the magnetic field", "heat", "space-time"],
            answer: 3
          }
        ],
        explanation: "Exactly: the key step is moving from necessarily flat geometry to a geometry capable of describing curvature."
      },
      {
        title: "Fact-Check Room",
        type: "checkbox",
        key: "3",
        prompt: "Select ONLY the historically and scientifically accurate statements.",
        options: [
          "Riemann directly developed all the tensor calculus later used by Einstein.",
          "Euclidean geometry describes flat spaces well.",
          "The problem of the Seven Bridges of Königsberg is connected to Euler.",
          "Einstein used geometric ideas compatible with Riemann’s work to formulate general relativity."
        ],
        answers: [1,2,3],
        explanation: "Good: the first statement is inaccurate. Riemann provided the geometric framework; modern tensor calculus was mainly developed by Ricci-Curbastro and Levi-Civita."
      },
      {
        title: "The Physics Lock",
        type: "multi",
        key: "212",
        prompt: "Open the physics lock: Newton, Einstein, and gravity.",
        questions: [
          {
            q: "In Newtonian physics, gravity is mainly described as:",
            options: ["curvature of space-time", "an attractive force between masses", "a vibration of the ether", "a thermal effect"],
            answer: 1
          },
          {
            q: "In general relativity, gravity is interpreted as:",
            options: ["an electric force", "a chemical reaction", "an effect of the curvature of space-time", "atmospheric pressure"],
            answer: 2
          },
          {
            q: "Which sentence is the most accurate?",
            options: ["Einstein removed mathematics from physics.", "Einstein used advanced mathematical tools to describe gravity.", "Einstein proved that Euclid was completely wrong.", "Riemann directly discovered general relativity."],
            answer: 1
          }
        ],
        explanation: "Perfect: Newton describes gravity as a force; Einstein interprets it geometrically through the curvature of space-time."
      }
    ];

    let current = -1;
    let solved = JSON.parse(localStorage.getItem("riemann_escape_solved_en") || "[]");

    const roomEl = document.getElementById("room");
    const pathEl = document.getElementById("path");
    const roomCounter = document.getElementById("roomCounter");
    const codeCounter = document.getElementById("codeCounter");

    function save() {
      localStorage.setItem("riemann_escape_solved_en", JSON.stringify(solved));
    }

    function resetGame() {
      solved = [];
      current = -1;
      save();
      renderPath();
      renderIntro();
    }

    function renderPath() {
      pathEl.innerHTML = "";
      rooms.forEach((room, i) => {
        const node = document.createElement("div");
        node.className = "node" + (i === current ? " active" : "") + (solved.includes(i) ? " done" : "");
        node.innerHTML = `
          <div class="node-number">${solved.includes(i) ? "✓" : i + 1}</div>
          <div>
            <div class="node-title">${room.title}</div>
            <div class="node-small">${solved.includes(i) ? "Unlocked: " + room.key : "To solve"}</div>
          </div>`;
        pathEl.appendChild(node);
      });
      codeCounter.textContent = `${solved.length}/5`;
    }

    function setFeedback(ok, text) {
      const fb = document.getElementById("feedback");
      fb.className = "feedback " + (ok ? "ok" : "no");
      fb.innerHTML = text;
      fb.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function unlockRoom(index) {
      if (!solved.includes(index)) {
        solved.push(index);
        save();
      }
      renderPath();
      const key = rooms[index].key;
      setFeedback(true, `<strong>Code unlocked:</strong> <span class="badge">${key}</span><br>${rooms[index].explanation}`);
      document.getElementById("nextBtn").classList.remove("hidden");
    }

    function checkSingle(room, index) {
      const selected = document.querySelector(`input[name="q0"]:checked`);
      if (!selected) return setFeedback(false, "Choose one answer before checking.");
      Number(selected.value) === room.answer ? unlockRoom(index) : setFeedback(false, "Not yet. Read the sentence carefully: the key idea is the shift from force to curvature.");
    }

    function checkMatch(room, index) {
      const selects = [...document.querySelectorAll("select[data-match]")];
      const ok = selects.every((sel, i) => sel.value === room.pairs[i].correct);
      ok ? unlockRoom(index) : setFeedback(false, "Not yet. Remember: these expressions must be interpreted in context, not translated literally.");
    }

    function checkMulti(room, index) {
      let ok = true;
      room.questions.forEach((q, qi) => {
        const selected = document.querySelector(`input[name="q${qi}"]:checked`);
        if (!selected || Number(selected.value) !== q.answer) ok = false;
      });
      ok ? unlockRoom(index) : setFeedback(false, "At least one answer needs revision. Check the comparison between Newton, Euclid, Riemann, and Einstein.");
    }

    function checkCheckbox(room, index) {
      const checked = [...document.querySelectorAll('input[name="check"]:checked')].map(x => Number(x.value)).sort();
      const target = [...room.answers].sort();
      const ok = checked.length === target.length && checked.every((v, i) => v === target[i]);
      ok ? unlockRoom(index) : setFeedback(false, "Not yet. Some statements in the video are effective as storytelling, but they are simplified or inaccurate.");
    }

    function renderIntro() {
      current = -1;
      roomCounter.textContent = "Intro";
      renderPath();
      roomEl.innerHTML = `
        <div class="intro">
          <h2>Mission</h2>
          <p>You have watched a video about Riemann, Einstein, and the geometry of curved space. Now you must prove that you understood not only the story, but also the English language and the key physics ideas behind it.</p>
          <div class="mission">
            <strong>Goal:</strong> complete 5 rooms, collect the hidden codes, and unlock the final code. Work carefully: some statements are accurate, while others are effective storytelling but need scientific correction.
          </div>
          <p><span class="badge">English expressions</span><span class="badge">Physics</span><span class="badge">Critical thinking</span><span class="badge">General relativity</span></p>
          <div class="buttons">
            <button class="primary" onclick="renderRoom(0)">Start the escape room</button>
            <button class="secondary" onclick="resetGame()">Reset progress</button>
          </div>
        </div>`;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderRoom(index) {
      current = index;
      const room = rooms[index];
      roomCounter.textContent = `${index + 1}/5`;
      renderPath();
      let html = `<div class="challenge"><h2>${room.title}</h2><p>${room.prompt}</p>`;
      if (room.quote) html += `<div class="quote">${room.quote}</div>`;

      if (room.type === "single") {
        html += `<div class="question"><h3>Choose one answer</h3><div class="options">`;
        room.options.forEach((op, i) => html += `<label class="option"><input type="radio" name="q0" value="${i}"><span>${String.fromCharCode(65+i)}. ${op}</span></label>`);
        html += `</div></div>`;
        html += buttons(`checkSingle(rooms[${index}], ${index})`, index);
      }

      if (room.type === "match") {
        html += `<div class="question"><h3>Match</h3><div class="match-grid">`;
        room.pairs.forEach((p, i) => {
          html += `<div class="match-row"><div><strong>${p.left}</strong></div><select data-match="${i}"><option value="">Choose...</option>${room.choices.map(c => `<option value="${c}">${c}</option>`).join("")}</select></div>`;
        });
        html += `</div></div>`;
        html += buttons(`checkMatch(rooms[${index}], ${index})`, index);
      }

      if (room.type === "multi") {
        room.questions.forEach((q, qi) => {
          html += `<div class="question"><h3>${qi + 1}. ${q.q}</h3><div class="options">`;
          q.options.forEach((op, oi) => html += `<label class="option"><input type="radio" name="q${qi}" value="${oi}"><span>${String.fromCharCode(65+oi)}. ${op}</span></label>`);
          html += `</div></div>`;
        });
        html += buttons(`checkMulti(rooms[${index}], ${index})`, index);
      }

      if (room.type === "checkbox") {
        html += `<div class="question"><h3>Select all and only the accurate statements</h3><div class="options">`;
        room.options.forEach((op, i) => html += `<label class="option"><input type="checkbox" name="check" value="${i}"><span>${op}</span></label>`);
        html += `</div></div>`;
        html += buttons(`checkCheckbox(rooms[${index}], ${index})`, index);
      }

      html += `<div id="feedback" class="feedback"></div></div>`;
      roomEl.innerHTML = html;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function buttons(checkCall, index) {
      const nextAction = index < rooms.length - 1 ? `renderRoom(${index + 1})` : `renderEnding()`;
      return `<div class="buttons">
        <button class="primary" onclick="${checkCall}">Check and unlock</button>
        <button id="nextBtn" class="secondary hidden" onclick="${nextAction}">${index < rooms.length - 1 ? "Go to the next room" : "Open the final code"}</button>
        <button class="secondary" onclick="renderIntro()">Back to the mission</button>
      </div>`;
    }

    function launchConfetti() {
      const colors = ["#d8b15f", "#6aa6c8", "#7cbf8c", "#f3efe3"];
      for (let i = 0; i < 70; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti-piece";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 0.5 + "s";
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 2600);
      }
    }

    function checkPrizeAnswer() {
      const input = document.getElementById("prizeAnswer");
      const box = document.getElementById("celebrationBox");
      const answer = input.value.trim().toLowerCase();
      const accepted = answer.includes("1854") || answer.includes("riemann") || answer.includes("lecture") || answer.includes("habilitation") || answer.includes("foundations of geometry") || answer.includes("geometry");

      if (accepted) {
        box.className = "celebration show";
        box.innerHTML = "<strong>Mission accomplished.</strong> You may now ask your teacher for the prize. The code 1854 refers to Riemann’s famous lecture on the foundations of geometry.";
        launchConfetti();
      } else {
        box.className = "feedback no";
        box.style.display = "block";
        box.innerHTML = "Not yet. Hint: it is the year of Riemann’s famous lecture about the foundations of geometry.";
      }
    }

    function renderEnding() {
      current = rooms.length;
      roomCounter.textContent = "Final";
      renderPath();
      const allSolved = rooms.every((_, i) => solved.includes(i));
      const collected = solved.map(i => rooms[i].key).join(" - ");
      roomEl.innerHTML = `
        <div class="ending">
          <h2>The code of curved geometry</h2>
          ${allSolved ? `
            <p>You collected all the intermediate codes:</p>
            <p>${rooms.map(r => `<span class="badge">${r.key}</span>`).join("")}</p>
            <p>The final code is the year of Riemann’s famous lecture on the foundations of geometry.</p>
            <div class="final-code">1854</div>

            <div class="prize-box">
              <h3 style="margin-top:0; color:var(--gold);">Prize challenge</h3>
              <p>To receive your prize, write what the final code <strong>1854</strong> refers to.</p>
              <input id="prizeAnswer" type="text" placeholder="Write your answer here..." autocomplete="off" />
              <div class="buttons">
                <button class="primary" onclick="checkPrizeAnswer()">Claim the prize</button>
              </div>
              <div id="celebrationBox" class="celebration"></div>
            </div>

            <div class="learning-summary">
              <h3>What you have learned</h3>
              <ul>
                <li><strong>Gravity:</strong> in Newtonian physics it is described as an attractive force between masses; in general relativity it is linked to the curvature of space-time.</li>
                <li><strong>Euclidean geometry:</strong> it works well for flat spaces, but it is not enough to describe curved spaces in a general way.</li>
                <li><strong>Riemannian geometry:</strong> it provides a way to describe spaces with curvature and more than three dimensions.</li>
                <li><strong>Space-time:</strong> the four-dimensional framework in which space and time are considered together in relativity.</li>
                <li><strong>Curvature:</strong> the mathematical idea used to describe how space-time is bent or warped by mass and energy.</li>
                <li><strong>Tensor calculus:</strong> an advanced mathematical language later used by Einstein; Riemann provided the geometric framework, while Ricci-Curbastro and Levi-Civita developed key parts of modern tensor calculus.</li>
              </ul>

              <h3>Useful English expressions from the video</h3>
              <ul>
                <li><strong>to hit a wall</strong> = to reach a serious obstacle.</li>
                <li><strong>to break with centuries of physics</strong> = to reject or move beyond a long-established scientific tradition.</li>
                <li><strong>to lack the language</strong> = not to have the right conceptual or mathematical tools.</li>
                <li><strong>to be pushed to the brink</strong> = to be brought close to collapse or failure.</li>
                <li><strong>groundwork</strong> = the basic work that makes later progress possible.</li>
                <li><strong>warping of space</strong> = deformation or bending of space.</li>
              </ul>
            </div>

            <div class="mission"><strong>Debriefing:</strong> Riemann did not formulate general relativity, but he built an essential part of the mathematical language that later made it possible to describe a universe that is not simply flat, but curved.</div>
          ` : `
            <p>You have not unlocked all rooms yet. Codes collected so far: ${collected || "none"}.</p>
          `}
          <div class="buttons">
            <button class="primary" onclick="renderIntro()">Review the mission</button>
            <button class="secondary" onclick="resetGame()">Start again</button>
          </div>
        </div>`;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    renderIntro();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</body>
</html>
